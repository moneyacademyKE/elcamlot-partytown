<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elcamlot Light - Partytown Financial Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #0b0f19;
      background-image: radial-gradient(circle at 10% 20%, rgba(249, 115, 22, 0.15), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.1), transparent 40%);
    }

    .glass {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .sidebar-btn.active {
      background: rgba(249, 115, 22, 0.12);
      border-color: rgba(249, 115, 22, 0.3);
    }

    .sidebar-btn:hover:not(.active) {
      background: rgba(255, 255, 255, 0.03);
    }

    .badge-crypto {
      background: rgba(16, 185, 129, 0.1);
      color: #10b981;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .badge-stock {
      background: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>

  <!-- Partytown Configuration -->
  <script>
    partytown = {
      lib: "/~partytown/",
      debug: true,
      forward: ["trackEvent"]
    };
  </script>

  <!-- Partytown Snippet -->
  <script src="/~partytown/partytown.js"></script>

  <!-- Telemetry and Analytics offloaded to Partytown Web Worker -->
  <script type="text/partytown">
    window.trackEvent = (name, data) => {
      console.log(`📊 [Partytown Worker] Event Tracking: "${name}"`, data);
      
      // Append a log line in the UI console log container
      const logger = document.getElementById("worker-logs");
      if (logger) {
        const time = new Date().toLocaleTimeString();
        const p = document.createElement("p");
        p.className = "text-emerald-400 font-mono text-2xs mb-1";
        p.innerHTML = `<span class="text-slate-500">[${time}]</span> Event <strong class="text-slate-200">"${name}"</strong> with: ${JSON.stringify(data)}`;
        logger.appendChild(p);
        logger.scrollTop = logger.scrollHeight;
      }
    };

    console.log("🚀 [Partytown Worker] Telemetry worker thread is initialized and running off main thread!");
  </script>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="glass border-b border-white/5 py-4 px-8 flex justify-between items-center z-10">
    <div class="flex items-center gap-3">
      <span class="text-orange-500 font-extrabold text-2xl tracking-tighter">ELCAMLOT</span>
      <span class="text-xs bg-white/5 px-2 py-0.5 rounded text-slate-400 font-mono">LIGHT</span>
    </div>
    <div class="flex items-center gap-4">
      <button onclick="triggerIngest('crypto')" class="px-4 py-2 text-xs font-semibold bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500/20 border border-emerald-500/30 rounded-xl transition duration-200">
        Trigger Crypto Ingest
      </button>
      <button onclick="triggerIngest('equity')" class="px-4 py-2 text-xs font-semibold bg-blue-500/10 text-blue-400 hover:bg-blue-500/20 border border-blue-500/30 rounded-xl transition duration-200">
        Trigger Equity Ingest
      </button>
      <span class="h-4 w-px bg-white/10"></span>
      <div class="flex items-center gap-2 text-xs text-slate-400 bg-white/5 px-3 py-1.5 rounded-lg">
        <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_#10b981]"></span>
        Cloudflare Edge Online
      </div>
    </div>
  </header>

  <!-- Main Content Layout -->
  <div class="flex-1 flex overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-80 glass border-r border-white/5 p-6 flex flex-col gap-6 overflow-y-auto">
      <div>
        <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider mb-3">Instruments</h2>
        <div id="instruments-list" class="flex flex-col gap-2">
          <!-- Populated dynamically -->
          <div class="text-xs text-slate-500 py-4 text-center">Loading instruments...</div>
        </div>
      </div>
      
      <!-- Worker logs (Partytown console output display) -->
      <div class="mt-auto border-t border-white/5 pt-6">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center justify-between">
          <span>Partytown Worker Logs</span>
          <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
        </h3>
        <div id="worker-logs" class="h-32 bg-black/40 border border-white/5 rounded-xl p-3 overflow-y-auto flex flex-col gap-1">
          <p class="text-slate-600 text-3xs font-mono">Initializing Worker...</p>
        </div>
      </div>
    </aside>

    <!-- Main Workspace -->
    <main class="flex-1 p-8 overflow-y-auto flex flex-col gap-8">
      
      <!-- active instrument details header -->
      <div class="flex items-center gap-4">
        <h1 id="active-symbol" class="text-4xl font-extrabold text-slate-100">BTC/USD</h1>
        <span id="active-asset-class" class="text-xs px-3 py-1 rounded-full uppercase font-bold tracking-wider">Crypto</span>
      </div>

      <!-- Loading skeleton / states -->
      <div class="data-loader flex flex-col gap-8 hidden">
        <div class="grid grid-cols-4 gap-6">
          <div class="h-28 glass rounded-2xl animate-pulse"></div>
          <div class="h-28 glass rounded-2xl animate-pulse"></div>
          <div class="h-28 glass rounded-2xl animate-pulse"></div>
          <div class="h-28 glass rounded-2xl animate-pulse"></div>
        </div>
        <div class="h-80 glass rounded-3xl animate-pulse"></div>
      </div>

      <!-- Data content container -->
      <div class="data-content flex flex-col gap-8">
        
        <!-- Stats cards -->
        <div class="grid grid-cols-4 gap-6">
          <div class="glass p-6 rounded-2xl flex flex-col gap-1">
            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Avg Close</span>
            <div id="avg-close" class="text-2xl font-bold text-slate-100">—</div>
          </div>
          <div class="glass p-6 rounded-2xl flex flex-col gap-1">
            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Median</span>
            <div id="median-close" class="text-2xl font-bold text-slate-100">—</div>
          </div>
          <div class="glass p-6 rounded-2xl flex flex-col gap-1">
            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">Low</span>
            <div id="low-close" class="text-2xl font-bold text-emerald-400">—</div>
          </div>
          <div class="glass p-6 rounded-2xl flex flex-col gap-1">
            <span class="text-xs text-slate-400 font-semibold uppercase tracking-wider">High</span>
            <div id="high-close" class="text-2xl font-bold text-rose-400">—</div>
          </div>
        </div>

        <!-- Chart Section -->
        <section class="glass p-6 rounded-3xl flex flex-col gap-4">
          <h2 class="text-lg font-bold text-slate-100">Price Trend</h2>
          <div id="chart-container" class="h-72 w-full">
            <!-- SVG rendered dynamically -->
          </div>
        </section>

        <!-- Table Section -->
        <section class="glass rounded-3xl overflow-hidden">
          <div class="px-6 py-4 border-b border-white/5">
            <h2 class="text-lg font-bold text-slate-100">Recent Price Bars</h2>
          </div>
          <div class="overflow-x-auto">
            <table class="min-w-full divide-y divide-white/5">
              <thead class="bg-white/2">
                <tr>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Date</th>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Open</th>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">High</th>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Low</th>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Close</th>
                  <th scope="col" class="px-6 py-3 text-left text-xs font-bold text-slate-400 uppercase tracking-wider">Volume</th>
                </tr>
              </thead>
              <tbody id="bars-table-body" class="divide-y divide-white/5 bg-transparent">
                <!-- Populated dynamically -->
              </tbody>
            </table>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script type="module" src="/src/dashboard.js"></script>
  
  <script>
    async function triggerIngest(type) {
      console.log(`Triggering ingestion for ${type}...`);
      try {
        const res = await fetch(`http://localhost:8787/api/ingest?type=${type}`);
        if (!res.ok) throw new Error("Failed to trigger ingestion");
        const data = await res.json();
        alert(`Ingestion triggered: Saved ${data.count} new bars!`);
        // Reload dashboard
        location.reload();
      } catch (err) {
        console.error("Ingestion trigger failed:", err);
        alert(`Failed to trigger ingestion: ${err.message}. Make sure wrangler dev is running.`);
      }
    }
  </script>
</body>
</html>
